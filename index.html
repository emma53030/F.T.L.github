<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流科技未來趨勢與創新 - 期末專題報告</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0A192F; --text: #E6F1FF; --accent: #64FFDA; }
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        /* 側邊欄導航 */
        .sidebar { width: 250px; height: 100vh; background: #020C1B; border-right: 1px solid rgba(100, 255, 218, 0.1); position: fixed; padding: 2rem; }
        .sidebar h2 { color: var(--accent); font-size: 1.2rem; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin: 1.5rem 0; }
        .sidebar a { text-decoration: none; color: var(--text); transition: 0.3s; }
        .sidebar a:hover { color: var(--accent); }

        /* 主要內容區 */
        main { margin-left: 250px; padding: 4rem; width: 100%; max-width: 900px; }
        section { margin-bottom: 5rem; }
        .chart-box { background: rgba(255, 255, 255, 0.03); padding: 2rem; border-radius: 15px; backdrop-filter: blur(10px); }
        
        /* 響應式調整 */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            main { margin-left: 0; padding: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>LOGI-TECH 2026</h2>
        <ul>
            <li><a href="#intro">1. 緒論</a></li>
            <li><a href="#tech">2. 關鍵趨勢</a></li>
            <li><a href="#case">3. 實務案例</a></li>
        </ul>
    </nav>

    <main>
        <section id="intro">
            <h1>物流科技的未來趨勢與創新</h1>
            <p>本研究探討從線性供應鏈到「物理網際網路 (PI)」的典範轉移，分析 AI 代理與自動化如何重塑流通管理的核心競爭力。</p>
        </section>

        <section id="tech">
            <h2>關鍵趨勢數據分析</h2>
            <div class="chart-box">
                <canvas id="myChart"></canvas>
            </div>
        </section>

        <section id="case">
            <h2>智慧物流實務應用</h2>
            <p>透過 Amazon Blue Jay 機器人與全聯/統一智慧物流園區案例，印證「貨就人」的高效作業模式。</p>
        </section>
    </main>

    <script>
        // 趨勢圖表邏輯
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['2026', '2027', '2028', '2029', '2030'],
                datasets: [{
                    label: '智慧物流產值 (億美元)',
                    data: [5000, 6500, 8000, 9500, 12000],
                    borderColor: '#64FFDA',
                    backgroundColor: 'rgba(100, 255, 218, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: '#E6F1FF' } } } }
        });
    </script>
</body>
</html>
